name: AutoPost LinkedIn Bot

on:
  schedule:
    - cron: "0 3 * * *"   # 8:00 AM PKT (UTC+5)
    - cron: "0 8 * * *"   # 1:00 PM PKT (UTC+5)
    - cron: "0 13 * * *"  # 6:00 PM PKT (UTC+5)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python run_once.py

      - name: Save post history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_history.json
          git diff --cached --quiet || git commit -m "chore: update post history"
          git push
